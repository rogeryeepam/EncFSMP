name: Build Windows Binary

on:
  push:
    branches: [master, main, develop]
    tags: ['*']
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build EncFSMP (Windows x64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MSYS2 / MinGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-wxwidgets3.2-msw
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libtiff
            make

      - name: Clone pfmkit (PFM headers)
        uses: actions/checkout@v4
        with:
          repository: rogeryeepam/pfmkit
          path: pfmkit

      - name: Print environment (debug)
        run: |
          echo "WORKSPACE=$GITHUB_WORKSPACE"
          echo "PWD=$(pwd)"
          echo "--- pfmkit ---"
          ls pfmkit/include/ 2>/dev/null || true
          find pfmkit -name "pfmapi.h" 2>/dev/null || true
          echo "--- MINGW prefix ---"
          ls /mingw64/bin/wx* 2>/dev/null | head -10 || true
          ls /mingw64/lib/libwx* 2>/dev/null | head -20 || true
          echo "--- wx-config ---"
          which wx-config 2>/dev/null || true
          wx-config --version 2>/dev/null || true
          echo "--- boost ---"
          ls /mingw64/include/boost/version.hpp 2>/dev/null || true
          echo "--- openssl ---"
          ls /mingw64/include/openssl/ssl.h 2>/dev/null || true
          echo "--- cmake ---"
          cmake --version | head -2

      - name: Configure CMake
        env:
          PFM_ROOT: ${{ github.workspace }}/pfmkit
        run: |
          WORKDIR=$(pwd)
          echo "WORKDIR=$WORKDIR"
          mkdir -p build
          cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_PREFIX_PATH=/mingw64 \
            -DwxWidgets_ROOT_DIR=/mingw64 \
            -DwxWidgets_LIB_DIR=/mingw64/lib \
            -DwxWidgets_CONFIGURATION=mswu \
            -DOPENSSL_ROOT_DIR=/mingw64 \
            -DBOOST_ROOT=/mingw64 \
            -DGOOGLE_TEST_LIBRARY="" \
            -DENCFSMP_DEFINE_STOCKICONINFO=TRUE \
            -DENCFSMP_REMOVE_ADDITIONAL_LIBRARIES=TRUE \
            -DEFS_USE_STATIC_LIBGCC=TRUE \
            ../src

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -- -j$(nproc) 2>&1 | tail -n 300

      - name: Collect build artifacts
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          $exe = Get-ChildItem -Path build -Filter "EncFSMP.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName -Destination $artifactDir
            Write-Output "Copied $($exe.FullName) to $artifactDir"
          } else {
            Write-Output "EncFSMP.exe not found"
            Get-ChildItem -Path build -Recurse | Select-Object FullName | Format-Table -AutoSize
            exit 1
          }

          # Recursively discover ALL DLL dependencies (direct + transitive).
          # Start from the .exe and all .a static libraries we built, then
          # follow the dependency chain by scanning each DLL we find.
          $msys2Bin = "D:\a\_temp\msys64\mingw64\bin"
          $objdump = "D:\a\_temp\msys64\mingw64\bin\objdump.exe"
          $allDlls = New-Object System.Collections.Generic.HashSet[string]
          $queue = New-Object System.Collections.Generic.Queue[string]

          # Initial targets: the exe and all .a files
          $queue.Enqueue($exe.FullName)
          Get-ChildItem -Path build -Filter "*.a" -Recurse | ForEach-Object { $queue.Enqueue($_.FullName) }

          # Process queue: for each file, extract DLL names, add to set, and
          # enqueue the DLL itself for further scanning (transitive deps).
          while ($queue.Count -gt 0) {
            $t = $queue.Dequeue()
            if (-not (Test-Path $t)) { continue }
            $deps = & $objdump -p $t 2>$null | Select-String -Pattern "DLL Name:"
            foreach ($line in $deps) {
              $dllName = ($line -split "DLL Name:")[1].Trim()
              if ($allDlls.Add($dllName)) {
                # New DLL found: enqueue it for transitive scanning
                $dllPath = Join-Path $msys2Bin $dllName
                if (Test-Path $dllPath) {
                  $queue.Enqueue($dllPath)
                }
              }
            }
          }

          Write-Output "Detected runtime DLL dependencies (including transitive):"
          $allDlls | Sort-Object | ForEach-Object { Write-Output "  - $_" }

          # Copy all discovered DLLs to the artifact directory
          foreach ($dep in $allDlls) {
            $src = Join-Path $msys2Bin $dep
            if (Test-Path $src) {
              Copy-Item $src -Destination $artifactDir -Force
            } else {
              Write-Output "DLL not found in msys2: $dep"
            }
          }

          Write-Output "Files in dist:"
          Get-ChildItem -Path $artifactDir | ForEach-Object { Write-Output ("  {0,12:N0} bytes  {1}" -f $_.Length, $_.Name) }

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EncFSMP-windows-x64
          path: dist

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
